services:
  app:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: betini-erp-app:local
    user: "${UID:-1000}:${GID:-1000}"
    init: true
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      APP_NAME: ${APP_NAME:-Betini ERP}
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: mysql
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-betini}
      DB_USERNAME: ${DB_USERNAME:-betini}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      CACHE_STORE: ${CACHE_STORE:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      RUN_COMPOSER_INSTALL: ${RUN_COMPOSER_INSTALL:-true}
      RUN_NPM_INSTALL: ${RUN_NPM_INSTALL:-true}
      RUN_NPM_BUILD: ${RUN_NPM_BUILD:-false}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      RUN_SEEDERS: ${RUN_SEEDERS:-true}
    volumes:
      - .:/var/www/html
      - composer-cache:/tmp/composer
      - npm-cache:/tmp/npm-cache
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php artisan about --only=environment >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=256m,mode=1777
    mem_limit: ${APP_MEMORY_LIMIT:-768m}
    cpus: ${APP_CPUS:-1.5}
    restart: unless-stopped

  database:
    image: mysql:8.4
    ports:
      - "127.0.0.1:${DB_FORWARD_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-betini}
      MYSQL_USER: ${DB_USERNAME:-betini}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --mysql-native-password=ON
      - --performance-schema=OFF
      - --innodb-buffer-pool-size=${MYSQL_BUFFER_POOL_SIZE:-128M}
      - --max-connections=${MYSQL_MAX_CONNECTIONS:-50}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - SYS_NICE
    mem_limit: ${DB_MEMORY_LIMIT:-768m}
    cpus: ${DB_CPUS:-1.0}
    restart: unless-stopped

volumes:
  mysql-data:
  composer-cache:
  npm-cache:
